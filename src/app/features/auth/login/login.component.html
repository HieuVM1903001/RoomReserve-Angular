<div class="bg-surface font-body-md text-on-surface min-h-screen flex items-center justify-center overflow-hidden relative">
  <div class="absolute inset-0 z-0">
    <div class="absolute inset-0 bg-surface-container-low opacity-60"></div>
    <div class="absolute inset-0 bg-gradient-to-tr from-surface/80 via-transparent to-primary/5"></div>
  </div>

  <main class="relative z-10 w-full max-w-md px-margin-mobile md:px-0 animate-fade-in">
    <div class="glass-card rounded-xl p-8 md:p-10 border border-surface-border">
      <div class="text-center mb-stack-lg">
        <div class="inline-flex items-center justify-center w-16 h-16 rounded-xl bg-primary-container mb-stack-md text-on-primary">
          <span class="material-symbols-outlined text-[40px]">meeting_room</span>
        </div>
        <h1 class="font-headline-md text-headline-md text-primary tracking-tight">RoomReserve</h1>
        <p class="font-body-md text-on-surface-variant mt-2">Hệ thống quản lý phòng họp doanh nghiệp</p>
      </div>

      <form class="space-y-stack-md" [formGroup]="form" (ngSubmit)="submit()">
        <div class="space-y-stack-sm">
          <label class="font-label-md text-label-md text-on-surface" for="usernameOrEmail">Tên đăng nhập hoặc Email</label>
          <div class="relative group">
            <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline group-focus-within:text-primary transition-colors">person</span>
            <input
              id="usernameOrEmail"
              formControlName="usernameOrEmail"
              type="text"
              placeholder="VD: admin@roomreserve.vn"
              class="w-full pl-10 pr-4 py-3 bg-surface-bright border border-surface-border rounded-lg font-body-md focus:outline-none focus:border-primary focus:ring-2 focus:ring-primary/10 transition-all placeholder:text-outline"
            />
          </div>
          <p *ngIf="form.get('usernameOrEmail')?.touched && form.get('usernameOrEmail')?.invalid" class="text-error text-label-sm">
            Vui lòng nhập tên đăng nhập hoặc email.
          </p>
        </div>

        <div class="space-y-stack-sm">
          <div class="flex justify-between items-center">
            <label class="font-label-md text-label-md text-on-surface" for="password">Mật khẩu</label>
          </div>
          <div class="relative group">
            <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline group-focus-within:text-primary transition-colors">lock</span>
            <input
              id="password"
              formControlName="password"
              [type]="showPassword() ? 'text' : 'password'"
              placeholder="••••••••"
              class="w-full pl-10 pr-12 py-3 bg-surface-bright border border-surface-border rounded-lg font-body-md focus:outline-none focus:border-primary focus:ring-2 focus:ring-primary/10 transition-all placeholder:text-outline"
            />
            <button type="button" (click)="togglePassword()" class="absolute right-3 top-1/2 -translate-y-1/2 text-outline hover:text-on-surface-variant transition-colors">
              <span class="material-symbols-outlined">{{ showPassword() ? 'visibility_off' : 'visibility' }}</span>
            </button>
          </div>
          <p *ngIf="form.get('password')?.touched && form.get('password')?.invalid" class="text-error text-label-sm">
            Vui lòng nhập mật khẩu.
          </p>
        </div>

        <div *ngIf="errorMessage()" class="bg-error-container text-on-error-container text-body-md px-4 py-3 rounded-lg">
          {{ errorMessage() }}
        </div>

        <button
          type="submit"
          [disabled]="loading()"
          class="w-full bg-primary text-on-primary font-label-md text-label-md py-3.5 rounded-lg hover:bg-primary-container hover:shadow-lg active:scale-[0.98] transition-all duration-200 mt-2 flex items-center justify-center gap-2 disabled:opacity-60"
        >
          <span *ngIf="!loading()">Đăng nhập</span>
          <span *ngIf="loading()">Đang kết nối...</span>
          <span *ngIf="!loading()" class="material-symbols-outlined text-sm">arrow_forward</span>
        </button>
      </form>

      <footer class="mt-8 text-center space-y-2">
        <p class="text-label-sm text-on-surface-variant">© 2026 RoomReserve. Toàn bộ bản quyền được bảo lưu.</p>
      </footer>
    </div>
  </main>
</div>
