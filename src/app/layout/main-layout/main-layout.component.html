<div class="bg-background text-on-background min-h-screen">
  <!-- SideNavBar -->
  <aside
    class="flex flex-col h-screen fixed left-0 top-0 border-r border-surface-border bg-surface w-72 z-40 transition-transform duration-300"
    [class.-translate-x-full]="!sidebarOpen"
    [class.md:translate-x-0]="true"
  >
    <div class="p-6 flex items-center gap-3">
      <div class="w-10 h-10 rounded-xl bg-primary flex items-center justify-center text-white shadow-lg">
        <span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">meeting_room</span>
      </div>
      <div>
        <h1 class="font-headline-sm text-headline-sm font-extrabold text-primary">RoomReserve</h1>
        <p class="text-[10px] uppercase tracking-widest text-on-surface-variant font-bold">Enterprise Edition</p>
      </div>
    </div>

    <nav class="flex-1 px-3 mt-2 space-y-1 overflow-y-auto custom-scrollbar">
      <a
        *ngFor="let item of visibleNavItems"
        [routerLink]="item.path"
        routerLinkActive="bg-primary-container text-on-primary-container font-bold scale-[0.98]"
        [routerLinkActiveOptions]="{ exact: false }"
        class="flex items-center gap-3 px-4 py-3 text-on-surface-variant hover:bg-surface-container-high transition-all rounded-lg font-body-md text-body-md"
      >
        <span class="material-symbols-outlined">{{ item.icon }}</span>
        <span>{{ item.label }}</span>
      </a>
    </nav>

    <!-- Single entry point for creating a booking, positioned just above the footer -->
    <div class="px-4 pb-2">
      <button
        (click)="goToNewBooking()"
        class="w-full py-3 bg-primary text-white rounded-xl font-label-md text-label-md flex items-center justify-center gap-2 shadow-md hover:opacity-90 active:scale-[0.98] transition-all"
      >
        <span class="material-symbols-outlined text-[20px]">add_circle</span>
        Tạo lịch đặt phòng
      </button>
    </div>

    <div class="p-4 border-t border-surface-border">
      <a
        (click)="logout()"
        class="flex items-center gap-3 px-4 py-3 text-status-rejected hover:bg-error-container/20 transition-all rounded-lg font-body-md text-body-md cursor-pointer"
      >
        <span class="material-symbols-outlined">logout</span>
        <span>Đăng xuất</span>
      </a>
    </div>
  </aside>

  <!-- Main Content Wrapper -->
  <main class="md:ml-72 min-h-screen flex flex-col">
    <!-- TopNavBar -->
    <header class="flex justify-between items-center w-full px-6 md:px-8 h-16 sticky top-0 z-30 bg-surface-container-lowest shadow-sm">
      <div class="flex items-center gap-4">
        <button (click)="toggleSidebar()" class="md:hidden p-2 hover:bg-surface-container-low rounded-full">
          <span class="material-symbols-outlined">menu</span>
        </button>
        <div class="relative group hidden sm:block">
          <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-on-surface-variant">
            <span class="material-symbols-outlined text-[20px]">search</span>
          </span>
          <input
            [ngModel]="searchQuery()"
            (ngModelChange)="searchQuery.set($event)"
            (focus)="searchFocused.set(true)"
            (blur)="onSearchBlur()"
            class="pl-10 pr-4 py-2 bg-surface-container-low border-none rounded-full text-body-md focus:ring-2 focus:ring-primary/20 w-64 transition-all"
            placeholder="Tìm kiếm phòng, sự kiện..."
            type="text"
          />
          <!-- Results dropdown -->
          <div
            *ngIf="searchFocused() && searchQuery().trim() && searchResults().length > 0"
            class="absolute top-full left-0 mt-2 w-80 bg-surface-container-lowest border border-surface-border rounded-xl shadow-xl overflow-hidden z-50"
          >
            <button
              *ngFor="let result of searchResults()"
              (click)="selectResult(result)"
              class="w-full flex items-center gap-3 px-4 py-3 hover:bg-surface-container-low text-left transition-colors border-b border-surface-border last:border-0"
            >
              <span class="material-symbols-outlined text-on-surface-variant text-[20px]">{{ result.type === 'room' ? 'meeting_room' : 'event' }}</span>
              <div class="min-w-0">
                <p class="font-label-md text-label-md text-on-surface truncate">{{ result.title }}</p>
                <p class="text-label-sm text-on-surface-variant truncate">{{ result.subtitle }}</p>
              </div>
            </button>
          </div>
          <div
            *ngIf="searchFocused() && searchQuery().trim() && searchResults().length === 0"
            class="absolute top-full left-0 mt-2 w-80 bg-surface-container-lowest border border-surface-border rounded-xl shadow-xl px-4 py-3 text-body-md text-on-surface-variant z-50"
          >
            Không tìm thấy phòng hoặc sự kiện phù hợp.
          </div>
        </div>
      </div>
      <div class="flex items-center gap-4">
        <div class="h-8 w-[1px] bg-surface-border mx-2 hidden md:block"></div>
        <div class="flex items-center gap-3">
          <div class="w-9 h-9 rounded-full bg-primary-container text-on-primary-container flex items-center justify-center font-bold">
            {{ (auth.currentUser()?.fullName || '?').charAt(0) }}
          </div>
          <div class="text-right hidden sm:block">
            <p class="font-label-md text-label-md text-on-surface leading-none">{{ auth.currentUser()?.fullName }}</p>
            <p class="text-[10px] text-on-surface-variant opacity-60">{{ (auth.currentUser()?.roles || []).join(', ') }}</p>
          </div>
        </div>
      </div>
    </header>

    <!-- Page Canvas -->
    <div class="flex-1 p-6 md:p-8 overflow-y-auto custom-scrollbar">
      <router-outlet></router-outlet>
    </div>
  </main>
</div>
